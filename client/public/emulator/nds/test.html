<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>NDS Test</title>
<style>
  body { margin:0; background:#111; color:#fff; font:14px monospace; }
  #wrap { display:flex; flex-direction:column; align-items:center; padding:16px; }
  #screens { display:flex; gap:8px; }
  canvas { border:2px solid #333; image-rendering:pixelated; }
  #log { margin-top:12px; padding:8px; background:#1a1a1a; max-width:600px; white-space:pre-wrap; word-break:break-all; }
  #controls { margin:12px 0; }
  button { padding:8px 16px; margin:0 4px; cursor:pointer; }
</style></head>
<body>
<div id="wrap">
  <h2>NDS melonDS WASM Test</h2>
  <div id="screens">
    <canvas id="top-screen" width="256" height="192"></canvas>
    <canvas id="bottom-screen" width="256" height="192"></canvas>
  </div>
  <div id="controls">
    <button onclick="testLoad()">Load ROM</button>
    <button onclick="testSave()">Read Save</button>
    <span id="rom-info" style="color:#aaa"></span>
  </div>
  <div id="log">Loading scripts...</div>
</div>
<script src="/emulator/nds/wasmemulator.js"></script>
<script src="/emulator/nds/webmelon.js"></script>
<script>
const log = (msg) => { document.getElementById('log').textContent += '\n' + msg; console.log(msg); };
const TOKEN = localStorage.getItem('access_token') || '';

async function testLoad() {
  log('Downloading ROM...');
  const res = await fetch('/api/Emulator/roms/pkm_diamond', { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (!res.ok) { log('ROM download FAILED: ' + res.status); return; }
  const romData = new Uint8Array(await res.arrayBuffer());
  log('ROM size: ' + (romData.length / 1024 / 1024).toFixed(1) + 'MB');
  document.getElementById('rom-info').textContent = '钻石 ' + (romData.length / 1024 / 1024).toFixed(1) + 'MB';

  WebMelon.storage.createDirectory('/roms');
  WebMelon.storage.createDirectory('/savefiles');
  WebMelon.storage.write('/roms/game.nds', romData);
  log('ROM written to VFS');

  WebMelon.emulator.createEmulator();
  log('Emulator created');
  WebMelon.emulator.loadFreeBIOS();
  log('FreeBIOS loaded');
  // 正确的 webmelon API: cart.loadFileIntoCart + emulator.loadCart
  WebMelon.cart.createCart();
  WebMelon.cart.loadFileIntoCart('/roms/game.nds');
  WebMelon.emulator.loadCart();
  log('ROM loaded into cart');
  const title = WebMelon.emulator.getGameTitle();
  log('Game title: ' + (title || '(null)'));
  WebMelon.emulator.startEmulation('top-screen', 'bottom-screen');
  log('Emulation STARTED!');
}

function testSave() {
  try {
    const saveData = Module.FS.readFile('/savefiles/game.sav');
    log('Save file: ' + saveData.length + ' bytes');
  } catch(e) {
    log('No save file: ' + e.message);
  }
}

WebMelon.assembly.addLoadListener(() => {
  log('');
  log('=== melonDS WASM ready ===');
  log('DS screen: ' + WebMelon.constants.DS_SCREEN_WIDTH + 'x' + WebMelon.constants.DS_SCREEN_HEIGHT);
  log('Click "Load ROM" to start!');
});
</script>
</body>
</html>
